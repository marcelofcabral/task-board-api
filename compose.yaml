services:
  # sets up the container that will run PostgreSQL with a healthcheck that
  # the migrate service will depend on.
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: "always"

  # this service depends on db and runs the Alembic migrations as the nonroot user,
  # creating/updating the DB on the volume whose ownership was changed to the nonroot user
  # by the init-data service.
  migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    command: [".venv/bin/alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://taskboard:taskboard@db:5432/taskboard}
    restart: "no"

  # this is the actual app service that starts the container which will run the FastAPI server.
  # At this point, the volume is already writeable by the nonroot user and the database structure
  # has already been created/updated.
  app:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - ${APP_PORT}:8000
    environment:
      - ACCESS_TOKEN_EXPIRY_MINUTES=${ACCESS_TOKEN_EXPIRY_MINUTES}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://taskboard:taskboard@db:5432/taskboard}

volumes:
  pg-data:
